<html>
<head>
<title>Sneaker Store</title>
<link rel="stylesheet" href="exp.css">
</head>

<body>

<div class="navbar">
  <h2>Sneaker Shop</h2>
  <div class="cart"> Cart: <span id="cartCount">0</span></div>
</div>

<div class="container">

  <div class="image">
    <img src="snek.png" width="220px">
  </div>

  <div class="details">
    <h2>Sneakers</h2>
    <p class="price">₹3500</p>

    <p><b>Color:</b></p>
    <label><input type="radio" name="c"> Grey</label>
    <label><input type="radio" name="c"> Black</label>
    <label><input type="radio" name="c"> White</label>

    <p><b>Size:</b></p>
    <label><input type="radio" name="s"> 6</label>
    <label><input type="radio" name="s"> 7</label>
    <label><input type="radio" name="s"> 8</label>

    <br>

    <button onclick="addToCart()">Add to Cart</button>
    <button class="buy">Buy Now</button>

    <p id="msg"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
